<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game of Life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light">

  <!-- ═══ SIDEBAR ═══ -->
  <aside id="sidebar">
    <div class="logo">
      <span class="logo-symbol">⬛</span>
      <h1>GAME<br/>OF LIFE</h1>
    </div>

    <!-- Controls -->
    <section class="panel" id="panel-controls">
      <h2 class="panel-title">CONTRÔLES</h2>

      <div class="btn-row">
        <button id="btn-play" class="btn btn-primary" title="Lancer / Pause (Espace)">
          <span id="play-icon">▶</span>
          <span id="play-label">PLAY</span>
        </button>
        <button id="btn-step" class="btn btn-secondary" title="Avancer d'un pas (→)">STEP</button>
      </div>

      <button id="btn-clear" class="btn btn-ghost full-width">EFFACER</button>
      <button id="btn-random" class="btn btn-ghost full-width">ALÉATOIRE</button>

      <div class="slider-group">
        <label>VITESSE <span id="speed-val">10</span> gen/s</label>
        <input type="range" id="speed-slider" min="1" max="60" value="10" />
      </div>

      <div class="slider-group">
        <label>ZOOM <span id="zoom-val">16</span>px</label>
        <input type="range" id="zoom-slider" min="4" max="64" value="16" />
      </div>
    </section>

    <!-- Stats -->
    <section class="panel" id="panel-stats">
      <h2 class="panel-title">STATISTIQUES</h2>
      <div class="stats-grid">
        <div class="stat-box">
          <span class="stat-label">GÉN.</span>
          <span class="stat-value" id="stat-gen">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">VIVANTS</span>
          <span class="stat-value" id="stat-alive">0</span>
        </div>
      </div>
      <div class="stat-wide">
        <span class="stat-label">POSITION</span>
        <span class="stat-value small" id="stat-pos">0, 0</span>
      </div>
    </section>

    <!-- Patterns -->
    <section class="panel" id="panel-patterns">
      <h2 class="panel-title">MOTIFS</h2>
      <select id="pattern-select" class="select-field">
        <option value="">— Choisir un motif —</option>
        <optgroup label="Oscillateurs">
          <option value="blinker">Blinker (T=2)</option>
          <option value="toad">Crapaud (T=2)</option>
          <option value="beacon">Phare (T=2)</option>
          <option value="pulsar">Pulsar (T=3)</option>
          <option value="pentadecathlon">Pentadécathlon (T=15)</option>
        </optgroup>
        <optgroup label="Vaisseaux">
          <option value="glider">Planeur (Glider)</option>
          <option value="lwss">LWSS</option>
          <option value="mwss">MWSS</option>
          <option value="hwss">HWSS</option>
        </optgroup>
        <optgroup label="Canons">
          <option value="gosper">Gosper Glider Gun</option>
          <option value="simkin">Simkin Glider Gun</option>
        </optgroup>
        <optgroup label="Still Life">
          <option value="block">Bloc</option>
          <option value="beehive">Ruche</option>
          <option value="loaf">Miche</option>
          <option value="boat">Bateau</option>
        </optgroup>
        <optgroup label="Autres">
          <option value="rpentomino">R-Pentomino</option>
          <option value="diehard">Die Hard</option>
          <option value="acorn">Gland (Acorn)</option>
          <option value="pi">Pi Heptomino</option>
        </optgroup>
      </select>

      <!-- Rotation -->
      <div class="transform-row">
        <label>ROTATION</label>
        <button class="btn-icon" id="btn-rot-ccw" title="Rotation -90°">↺</button>
        <span class="rotation-display" id="rot-display">0°</span>
        <button class="btn-icon" id="btn-rot-cw"  title="Rotation +90°">↻</button>
      </div>

      <!-- Miroir -->
      <div class="transform-row">
        <label>MIROIR</label>
        <button class="btn-icon" id="btn-flip-h" title="Miroir horizontal">⇔</button>
        <button class="btn-icon" id="btn-flip-v" title="Miroir vertical">⇕</button>
        <button class="btn-icon" id="btn-reset-transform" title="Réinitialiser">✕</button>
      </div>

      <!-- Placement -->
      <div class="btn-row">
        <button id="btn-place" class="btn btn-primary full-width">PLACER AU CENTRE</button>
      </div>
      <button id="btn-place-click" class="btn btn-secondary full-width">PLACER AU CLIC</button>
      <div class="place-mode-hint" id="place-hint">Cliquez sur la grille ↑</div>
    </section>

    <!-- Import / Export -->
    <section class="panel" id="panel-io">
      <h2 class="panel-title">IMPORT / EXPORT</h2>
      <div class="btn-row">
        <button id="btn-export-json" class="btn btn-ghost">JSON</button>
        <button id="btn-export-rle" class="btn btn-ghost">RLE</button>
      </div>
      <label class="btn btn-ghost full-width file-label" title="Importer JSON ou RLE">
        IMPORTER
        <input type="file" id="file-import" accept=".json,.rle,.txt" hidden />
      </label>
    </section>

    <!-- Theme -->
    <div class="theme-row">
      <span>THÈME</span>
      <button id="btn-theme" class="theme-toggle" title="Inverser le thème">
        <span id="theme-icon">◐</span>
      </button>
    </div>

    <div class="help-hint">
      <kbd>Espace</kbd> play · <kbd>→</kbd> step<br/>
      <kbd>Clic droit+glisser</kbd> pan · <kbd>Molette</kbd> zoom<br/>
      <kbd>+/-</kbd> zoom · <kbd>0</kbd> centrer · <kbd>Échap</kbd> annuler</div>
  </aside>

  <!-- ═══ CANVAS AREA ═══ -->
  <main id="canvas-area">
    <canvas id="life-canvas"></canvas>

    <!-- Floating HUD -->
    <div id="hud">
      <span id="hud-gen">GÉN. 0</span>
      <span id="hud-mode" class="mode-badge">DESSIN</span>
    </div>

    <!-- Notification toast -->
    <div id="toast"></div>
  </main>

  <!-- ═══ MODAL ═══ -->
  <div id="modal-overlay" hidden>
    <div id="modal">
      <div id="modal-title">Export</div>
      <textarea id="modal-text" spellcheck="false" readonly></textarea>
      <div class="btn-row">
        <button id="modal-copy" class="btn btn-primary">COPIER</button>
        <button id="modal-close" class="btn btn-ghost">FERMER</button>
      </div>
    </div>
  </div>

  <script src="patterns.js"></script>
  <script src="life.js"></script>
  <script src="renderer.js"></script>
  <script src="ui.js"></script>
</body>
</html>
